name: Build Setup Wizard

on:
  push:
    tags:
      - 'wizard-v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: tools/setup-wizard

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Build Windows installer
        run: npm run build:win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: wizard-win
          path: tools/setup-wizard/dist/*.exe
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Base-App Setup Wizard ${{ github.ref_name }}"
          body: |
            ## Base-App Setup Wizard ${{ github.ref_name }}

            Download the `.exe` below, double-click to install. No Node.js or npm required.

            ### Steps
            1. Run the wizard
            2. Choose a parent folder — wizard clones `base-app` for you
            3. Fill in the 10-step form
            4. Click **Generate App** — `master-prompt.md` opens in Cursor
            5. Paste into a Cursor Agent chat and let the AI finish setup
          files: artifacts/**/*.exe
          draft: false
          prerelease: ${{ contains(github.ref_name, 'beta') || contains(github.ref_name, 'rc') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
